<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punto Indigo · Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0b;
    --surface: #111110;
    --card: #141413;
    --border: #1e1e1c;
    --border2: #2a2a26;
    --text: #e8e6df;
    --muted: #5a5952;
    --muted2: #3d3d38;
    --accent: #c8f135;
    --accent-dim: #7a9a20;
    --accent-bg: #0f1600;
    --red: #f13535;
    --red-bg: #160a0a;
    --online: #35f178;
    --online-bg: #001609;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* ── Topbar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-mark svg { display: block; }
  .logo-name {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .now {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .refresh-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .refresh-btn:hover { color: var(--text); border-color: var(--muted); }

  /* ── Layout ── */
  .page { max-width: 1200px; margin: 0 auto; padding: 36px 32px 60px; }

  /* ── Section ── */
  .section { margin-bottom: 44px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border2);
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color .15s, background .15s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    border-color: var(--border2);
    background: #181816;
  }
  .card.card--local:hover { border-color: #2a3a00; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .card-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    border: 1px solid var(--border2);
    background: var(--surface);
  }
  .card-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    margin-top: 2px;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted2);
    transition: background .3s;
    flex-shrink: 0;
  }
  .dot.online { background: var(--online); box-shadow: 0 0 6px var(--online); }
  .dot.offline { background: var(--red); }
  .dot.checking { animation: pulse 1.2s infinite; }
  .status-text {
    color: var(--muted);
    transition: color .3s;
  }
  .status-text.online { color: var(--online); }
  .status-text.offline { color: var(--red); }

  .card-name {
    font-size: 15px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
    margin-top: 2px;
  }
  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    flex: 1;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 2px;
  }
  .card-url {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
    transition: color .15s;
  }
  .card:hover .card-url { color: var(--muted); }
  .card-arrow {
    color: var(--muted2);
    font-size: 14px;
    transition: transform .15s, color .15s;
  }
  .card:hover .card-arrow { transform: translate(2px, -2px); color: var(--accent); }

  /* ── Sub-links ── */
  .card-links {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .card-link {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    padding: 3px 8px;
    border-radius: 3px;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--muted);
    cursor: pointer;
    transition: color .1s, border-color .1s;
    user-select: none;
  }
  .card-link:hover { color: var(--text); border-color: var(--muted2); }

  /* ── Badges ── */
  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.5px;
  }
  .badge-vercel { background: #111; color: #888; border: 1px solid #222; }
  .badge-local { background: var(--accent-bg); color: var(--accent-dim); border: 1px solid #1e2d00; }
  .badge-wip { background: #1a0f00; color: #aa6020; border: 1px solid #2a1800; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .3; }
  }

  /* ── Stats bar ── */
  .statsbar {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 14px 0 30px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-val {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
  }
  .stat-val span { color: var(--accent); }
  .stat-key {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .stat-sep { width: 1px; height: 36px; background: var(--border); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect width="6" height="6" fill="#0c0c0b"/>
        <rect x="8" width="6" height="6" fill="#0c0c0b"/>
        <rect y="8" width="6" height="6" fill="#0c0c0b"/>
        <rect x="8" y="8" width="6" height="6" fill="#0c0c0b"/>

    </div>
    <div>
      <div class="logo-name">Punto Indigo</div>
      <div class="logo-sub">Hub de servicios</div>

  </div>
  <div class="topbar-right">
    <span class="now" id="clock"></span>
    <button class="refresh-btn" onclick="checkAll()">↻ actualizar</button>
  </div>
</div>

<div class="page">

  <div class="statsbar">
    <div class="stat">
      <div class="stat-val" id="stat-total">—</div>
      <div class="stat-key">servicios</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <div class="stat-val" id="stat-online"><span>—</span></div>
      <div class="stat-key">online local</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <div class="stat-val" id="stat-cloud">—</div>
      <div class="stat-key">en cloud</div>
    </div>
  </div>

  <!-- LOCAL -->
  <div class="section">
    <div class="section-header">
      <span class="section-label">Local · PM2</span>
      <span class="section-count" id="count-local">—</span>
    </div>
    <div class="grid" id="grid-local"></div>
  </div>

  <!-- CLOUD -->
  <div class="section">
    <div class="section-header">
      <span class="section-label">Cloud · Vercel</span>
      <span class="section-count" id="count-cloud">—</span>
    </div>
    <div class="grid" id="grid-cloud"></div>
  </div>

</div>

// ── Render ──────────────────────────────────────────────────────────────────

function makeCard(svc, type) {
  const isLocal = type === 'local'
  const card = document.createElement('a')
  card.href = svc.url
  card.target = '_blank'
  card.rel = 'noopener'
  card.className = `card${isLocal ? ' card--local' : ''}`
  if (isLocal) card.dataset.ping = svc.ping

  const badgeLabel = { vercel: 'VERCEL', local: 'LOCAL', wip: 'WIP' }[svc.badge]

  card.innerHTML = `
    <div class="card-top">
      <div class="card-icon">${svc.icon}</div>
      ${isLocal ? `
        <div class="card-status">
          <div class="dot checking" data-dot></div>
          <span class="status-text" data-status>verificando</span>
        </div>
      ` : `<span class="badge badge-${svc.badge}">${badgeLabel}</span>`}
    </div>
    <div>
      <div class="card-name">${svc.name}</div>
      <div class="card-desc">${svc.desc}</div>
    </div>
    <div class="card-footer">
      <span class="card-url">${svc.ext || svc.url.replace('https://', '').replace('http://', '')}</span>
      <span class="card-arrow">↗</span>
    </div>
    ${svc.links ? `
    <div class="card-links" onclick="event.stopPropagation()">
      ${svc.links.map(l => `<span class="card-link" onclick="window.open('${l.url}','_blank');event.stopPropagation()">${l.label}</span>`).join('')}
    </div>` : ''}
  `
  return card
}

function renderGrid(services, containerId, type) {
  const container = document.getElementById(containerId)
  container.innerHTML = ''
  services.forEach(svc => container.appendChild(makeCard(svc, type)))
}

// ── Health checks ────────────────────────────────────────────────────────────

async function ping(url) {
  try {
    const r = await fetch(`/ping?url=${encodeURIComponent(url)}`, { signal: AbortSignal.timeout(3000) })
    const data = await r.json()
    return data.up
  } catch {
    return false
  }
}

async function checkAll() {
  const cards = document.querySelectorAll('.card--local')
  let online = 0
  const checks = Array.from(cards).map(async (card) => {
    const dot = card.querySelector('[data-dot]')
    const status = card.querySelector('[data-status]')
    dot.className = 'dot checking'
    status.textContent = 'verificando'
    status.className = 'status-text'

    const up = await ping(card.dataset.ping)
    dot.className = `dot ${up ? 'online' : 'offline'}`
    status.textContent = up ? 'online' : 'offline'
    status.className = `status-text ${up ? 'online' : 'offline'}`
    if (up) online++
  })
  await Promise.all(checks)
  document.getElementById('stat-online').innerHTML = `<span>${online}</span> / ${LOCAL.length}`
}

// ── Clock ───────────────────────────────────────────────────────────────────

function updateClock() {
  const now = new Date()
  const pad = n => String(n).padStart(2, '0')
  document.getElementById('clock').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`
}
setInterval(updateClock, 1000)
updateClock()

// ── Init ─────────────────────────────────────────────────────────────────────

renderGrid(LOCAL, 'grid-local', 'local')
renderGrid(CLOUD, 'grid-cloud', 'cloud')

document.getElementById('stat-total').textContent = LOCAL.length + CLOUD.length
document.getElementById('stat-cloud').textContent = CLOUD.length
document.getElementById('count-local').textContent = LOCAL.length
document.getElementById('count-cloud').textContent = CLOUD.length
document.getElementById('stat-online').innerHTML = `<span>—</span>`

checkAll()
</script>
